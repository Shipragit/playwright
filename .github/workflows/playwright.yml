name: Playwright Tests

on:
  push:
    branches: [ main, master ]

  pull_request:
    branches: [ main, master ]
  
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Node dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: pip install boto3

    - name: Run Playwright tests
      continue-on-error: true
      run: npx playwright test

    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload JSON Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-json-report
        path: playwright-report.json
        
    - name: Generate HTML report
      run: python generate_report.py

    - name: Run AI Analyzer
      if: always()
      continue-on-error: true
      run: python bedrock.py playwright-report.json

    - name: Send email with report
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "Playwright Test Report - ${{ job.status }}"
        to: Shivakumara.Appaji@infinite.com
        from: sudhir.bagi@infinite.com
        #body: |
          #Playwright test execution completed.
          #Status: ${{ job.status }}
        html_body: file://email-report.html

        attachments: |
            playwright-report/index.html
            ai-analysis.txt
        
